<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register — STAB</title>
  <meta name="description" content="Create your Student Teacher Appointment Booking account">

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="common.css">
  <link rel="stylesheet" href="register.css">
</head>
<body>

  <!-- Background Orbs -->
  <div class="auth-orb auth-orb-1"></div>
  <div class="auth-orb auth-orb-2"></div>

  <!-- Back Link -->
  <a href="index.html" class="back-link">← Back to Home</a>

  <!-- Register Card -->
  <div class="auth-wrapper">
    <div class="auth-card animate-scaleIn">

      <div class="auth-icon">
        <div class="brand-icon" style="width:52px;height:52px;font-size:22px;">📅</div>
      </div>

      <h1>Create Account</h1>
      <p class="auth-subtitle">Register to get started with STAB</p>

      <!-- Full Name -->
      <div class="form-group">
        <label class="form-label">Full Name</label>
        <div class="input-icon-wrap">
          <span class="icon">👤</span>
          <input type="text" id="regName" class="form-input" placeholder="John Doe">
        </div>
      </div>

      <!-- Email -->
      <div class="form-group">
        <label class="form-label">Email Address</label>
        <div class="input-icon-wrap">
          <span class="icon">✉️</span>
          <input type="email" id="regEmail" class="form-input" placeholder="your.email@example.com">
        </div>
      </div>

      <!-- Password -->
      <div class="form-group">
        <label class="form-label">Password</label>
        <div class="input-icon-wrap">
          <span class="icon">🔒</span>
          <input type="password" id="regPassword" class="form-input" placeholder="Minimum 6 characters">
        </div>
      </div>

      <!-- Confirm Password -->
      <div class="form-group">
        <label class="form-label">Confirm Password</label>
        <div class="input-icon-wrap">
          <span class="icon">🔒</span>
          <input type="password" id="regConfirmPassword" class="form-input" placeholder="Re-enter your password">
        </div>
      </div>

      <!-- Role -->
      <div class="form-group">
        <label class="form-label">Register As</label>
        <div class="role-select">
          <button class="role-btn active" data-role="student">🎓 Student</button>
          <button class="role-btn" data-role="teacher">👨‍🏫 Teacher</button>
        </div>
      </div>

      <!-- Submit -->
      <button class="btn btn-primary btn-lg" id="registerBtn" style="width:100%">
        <span id="registerBtnText">Create Account</span>
        <div class="spinner spinner-sm" id="registerSpinner" style="display:none;border-top-color:#fff;border-color:rgba(255,255,255,0.3);"></div>
      </button>

      <p class="auth-footer">
        Already have an account? <a href="login.html">Sign in here</a>
      </p>
    </div>
  </div>

  <!-- Toast Container -->
  <div class="toast-container" id="toastContainer"></div>

  <script type="module" src="register.js"></script>
</body>
</html>
