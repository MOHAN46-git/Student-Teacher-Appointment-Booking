<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register | Appointment Booking</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="register.css">
</head>
<body>

  <!-- Back -->
  <a href="index.html" class="back-link">← Back to Home</a>

  <!-- Register Card -->
  <div class="register-wrapper">
    <div class="register-card">

      <div class="icon-box">📅</div>

      <h1>Create Account</h1>
      <p class="subtitle">Register to get started</p>

      <!-- Full Name -->
      <label>Full Name</label>
      <div class="input-box">
        <span>👤</span>
        <input type="text" placeholder="John Doe">
      </div>

      <!-- Email -->
      <label>Email Address</label>
      <div class="input-box">
        <span>✉️</span>
        <input type="email" placeholder="your.email@example.com">
      </div>

      <!-- Password -->
      <label>Password</label>
      <div class="input-box">
        <span>🔒</span>
        <input type="password" placeholder="••••••••">
      </div>

      <!-- Confirm Password -->
      <label>Confirm Password</label>
      <div class="input-box">
        <span>🔒</span>
        <input type="password" placeholder="••••••••">
      </div>

      <!-- Role -->
      <label>Register as</label>
      <div class="role-select">
        <button class="role active">Student</button>
        <button class="role">Teacher</button>
      </div>

      <!-- Button -->
      <button class="register-btn">Create Account</button>

      <p class="login-text">
        Already have an account?
        <a href="login.html">Login here</a>
      </p>

    </div>
  </div>

  <script src="register.js"></script>
</body>
</html>
