<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Student Dashboard — STAB</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="common.css">
  <link rel="stylesheet" href="student-dashboard.css">
</head>
<body>

  <!-- Header -->
  <header class="dashboard-header">
    <div class="header-left">
      <h1>🎓 <span class="gradient-text">Student Dashboard</span></h1>
      <p id="welcomeText">Welcome back!</p>
    </div>
    <div class="header-right">
      <button class="btn btn-ghost" id="themeToggle" title="Toggle dark mode">🌙</button>
      <button class="btn btn-outline btn-sm" id="logoutBtn">↗ Logout</button>
    </div>
  </header>

  <!-- Main Content -->
  <main class="dashboard-body">
    <div class="dashboard-grid">

      <!-- LEFT: Book Appointment -->
      <section class="glass-card animate-fadeInUp">
        <div class="card-header">
          <h2>📅 Book an Appointment</h2>
          <p class="card-sub">Schedule a meeting with your teacher</p>
        </div>

        <div class="form-group">
          <label class="form-label">Select Teacher</label>
          <select class="form-input" id="teacherSelect">
            <option value="">Choose a teacher...</option>
          </select>
        </div>

        <div class="form-group">
          <label class="form-label">Select Date</label>
          <input type="date" class="form-input" id="dateInput">
        </div>

        <div class="form-group">
          <label class="form-label">Available Time Slots</label>
          <div class="slots-grid" id="slotsContainer">
            <div class="empty-state" style="padding:24px">
              <p>Select a teacher and date to view available slots</p>
            </div>
          </div>
        </div>

        <button class="btn btn-primary btn-lg" id="bookBtn" style="width:100%">
          <span id="bookBtnText">Book Appointment</span>
          <div class="spinner spinner-sm" id="bookSpinner" style="display:none;border-top-color:#fff;border-color:rgba(255,255,255,0.3);"></div>
        </button>
      </section>

      <!-- RIGHT: My Appointments -->
      <section class="glass-card animate-fadeInUp delay-1">
        <div class="card-header">
          <h2>📋 My Appointments</h2>
          <p class="card-sub">Track your scheduled meetings</p>
        </div>

        <div id="appointmentsContainer">
          <div class="empty-state">
            <div class="empty-icon">📅</div>
            <h3>No appointments yet</h3>
            <p>Book your first appointment to get started</p>
          </div>
        </div>
      </section>

    </div>
  </main>

  <!-- Toast Container -->
  <div class="toast-container" id="toastContainer"></div>

  <script type="module" src="student-dashboard.js"></script>
</body>
</html>
