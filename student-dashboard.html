<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Student Dashboard</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="student-dashboard.css">
</head>
<body>

  <!-- Header -->
  <header class="top-bar">
    <div>
      <h1>Student Dashboard</h1>
      <p>Welcome back, ncas2427se1316!</p>
    </div>

    <div class="header-actions">
      <button class="icon-btn">🌙</button>
      <button class="logout-btn">↗ Logout</button>
    </div>
  </header>

  <!-- Main -->
  <main class="dashboard">

    <!-- Left Card -->
    <section class="card">
      <h2>Book an Appointment</h2>
      <p class="sub">Schedule a meeting with your teacher</p>

      <label>Select Teacher</label>
      <select>
        <option>Choose a teacher...</option>
        <option>Dr. Kumar</option>
        <option>Ms. Priya</option>
      </select>

      <label>Select Date</label>
      <div class="date-input">
        <span>📅</span>
        <input type="text" placeholder="dd-mm-yyyy">
      </div>

      <label>Available Time Slots</label>
      <div class="empty-slot">
        Select teacher and date to see available slots
      </div>

      <button class="primary-btn">Book Appointment</button>
    </section>

    <!-- Right Card -->
    <section class="card">
      <h2>My Appointments</h2>
      <p class="sub">Track your scheduled meetings</p>

      <div class="empty-appointments">
        <div class="calendar-icon">📅</div>
        <h3>No appointments yet</h3>
        <p>Book your first appointment to get started</p>
      </div>
    </section>

  </main>

  <script src="student-dashboard.js"></script>
</body>
</html>
